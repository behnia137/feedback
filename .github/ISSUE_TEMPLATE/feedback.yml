name: 💬 Share feedback
description: Report a bug or suggest an idea — for any of my projects
title: "[Feedback] "
# Per-app deep links pre-select the project, e.g.
#   .../issues/new?template=feedback.yml&project=BENIX+Theme+Studio
# The `project` query param must match the dropdown `id` below.
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for helping make things better 🙌
        Just a few quick fields — no GitHub experience needed.
        Screenshots or a short clip help a lot: drag them straight into **Tell me more**.
  - type: dropdown
    id: project
    attributes:
      label: 📦 Which project?
      description: Pick the one this is about.
      options:
        - BENIX Theme Studio
        - n8n Workflow Explorer
        # TODO: add your other projects here, one per line (plain text — keep it deep-link friendly)
        - Other / not listed
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: 🏷️ What kind of feedback?
      options:
        - 🐞 Bug — something's broken or looks wrong
        - 💡 Idea — a feature or improvement
        - ❓ Question — how does this work?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: ✍️ Tell me more
      description: What happened, or what would you like to see? For a bug, what did you *expect* vs. what actually happened?
      placeholder: |
        Example
        ───────
        When I export a theme, the accent color looks different in Power BI than in the preview.
        • Expected: the same color as the preview
        • Saw: a slightly darker shade
        • Browser / OS: Chrome on Windows 11
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: 📫 Contact (optional)
      description: Email or handle if you'd like a reply. Leave blank to stay anonymous.
      placeholder: you@example.com
    validations:
      required: false
