name: Feedback
description: Report a bug or suggest an idea for one of my projects
title: "[Feedback] "
# Per-app deep links can pre-select the project and add a triage label, e.g.
#   .../issues/new?template=feedback.yml&project=BENIX+Theme+Studio
# (the `project` query param matches the dropdown id below and pre-selects it).
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time! Pick the project, tell me what's up, and submit.
        No GitHub experience needed — just fill the fields below.
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is this about?
      options:
        - BENIX Theme Studio
        # TODO: add your other projects here, one per line
        - Other / not listed
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug
        - Idea / feature request
        - Question
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What happened, or what would you like to see? For a bug, steps to reproduce help a lot.
      placeholder: Describe it here…
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
      description: Email or handle if you'd like a reply. Leave blank to stay anonymous.
    validations:
      required: false
